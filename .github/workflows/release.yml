name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate changelog entry exists
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::No changelog entry found for version $VERSION in CHANGELOG.md"
            echo "Please add a changelog entry before releasing."
            exit 1
          fi
          echo "✅ Changelog entry found for version $VERSION"

      - name: Verify tests passed on master
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-and-lint.yml',
              branch: 'master',
              status: 'completed',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No test-and-lint workflow runs found on master branch!');
              return;
            }
            
            const latestRun = runs.data.workflow_runs[0];
            console.log(`Latest test-and-lint run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.conclusion}`);
            
            if (latestRun.conclusion !== 'success') {
              core.setFailed(`Latest test-and-lint on master did not pass (status: ${latestRun.conclusion}). Please fix tests before releasing.`);
            } else {
              console.log('✅ Tests passed on master');
            }

  build:
    needs: [validate]
    strategy:
      matrix:
        runner-os: [windows-latest, ubuntu-latest, macos-latest]
    
    runs-on: ${{ matrix.runner-os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build artifact (Windows)
        if: matrix.runner-os == 'windows-latest'
        run: make build-windows

      - name: Build artifact (macOS)
        if: matrix.runner-os == 'macos-latest'
        run: make build-mac

      - name: Build artifact (Linux)
        if: matrix.runner-os == 'ubuntu-latest'
        run: make build-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: artifact-${{ matrix.runner-os }}
          path: dist/bin/
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release_files
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release_files
          find . -maxdepth 1 -type f ! -name 'checksums-sha256.txt' -exec sha256sum {} \; > checksums-sha256.txt
          echo "Generated checksums:"
          cat checksums-sha256.txt

      - name: Extract changelog for release
        id: changelog
        run: |
          # Extract version from git tag (e.g., v1.1.0 -> 1.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Extract the changelog section for this version
          # Sed pattern: find the version header and extract until the next version header or end
          CHANGELOG_SECTION=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          
          # If no changelog section found, use a default message
          if [ -z "$CHANGELOG_SECTION" ]; then
            echo "⚠️  No changelog entry found for version $VERSION. Using default release notes."
            echo "Release $VERSION" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> /tmp/release_notes.md
          else
            # Remove the trailing version marker line if present
            echo "$CHANGELOG_SECTION" | sed '$d' > /tmp/release_notes.md
          fi
          
          # Make it available for next step (set output variable)
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: release_files/*
          fail_on_unmatched_files: true
