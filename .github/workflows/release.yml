name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate changelog entry exists
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::No changelog entry found for version $VERSION in CHANGELOG.md"
            echo "Please add a changelog entry before releasing."
            exit 1
          fi
          echo "✅ Changelog entry found for version $VERSION"

      - name: Verify tests passed on master
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-and-lint.yml',
              branch: 'master',
              status: 'completed',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No test-and-lint workflow runs found on master branch!');
              return;
            }
            
            const latestRun = runs.data.workflow_runs[0];
            console.log(`Latest test-and-lint run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.conclusion}`);
            
            if (latestRun.conclusion !== 'success') {
              core.setFailed(`Latest test-and-lint on master did not pass (status: ${latestRun.conclusion}). Please fix tests before releasing.`);
            } else {
              console.log('✅ Tests passed on master');
            }

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build and publish extension
        uses: cli/gh-extension-precompile@v2
        with:
          build_script_override: "script/build.sh"
