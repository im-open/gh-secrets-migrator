name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        runner-os: [windows-latest, ubuntu-latest, macos-latest]
    
    runs-on: ${{ matrix.runner-os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests configured"
          fi
        shell: bash

      - name: Build artifact (Windows)
        if: matrix.runner-os == 'windows-latest'
        run: |
          python -m pip install -r requirements.txt
          make build-windows

      - name: Build artifact (macOS)
        if: matrix.runner-os == 'macos-latest'
        run: |
          python -m pip install -r requirements.txt
          make build-mac

      - name: Build artifact (Linux)
        if: matrix.runner-os == 'ubuntu-latest'
        run: |
          python -m pip install -r requirements.txt
          make build-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: artifact-${{ matrix.runner-os }}
          path: dist/bin/
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release_files
          merge-multiple: true

      - name: Extract changelog for release
        id: changelog
        run: |
          # Extract version from git tag (e.g., v1.1.0 -> 1.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Extract the changelog section for this version
          # Sed pattern: find the version header and extract until the next version header or end
          CHANGELOG_SECTION=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          
          # If no changelog section found, use a default message
          if [ -z "$CHANGELOG_SECTION" ]; then
            echo "⚠️  No changelog entry found for version $VERSION. Using default release notes."
            echo "Release $VERSION" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> /tmp/release_notes.md
          else
            # Remove the trailing version marker line if present
            echo "$CHANGELOG_SECTION" | sed '$d' > /tmp/release_notes.md
          fi
          
          # Make it available for next step (set output variable)
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Update Release Notes
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const body = fs.readFileSync('/tmp/release_notes.md', 'utf8');
              
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              
              const tagName = context.ref.replace('refs/tags/', '');
              const release = releases.data.find(r => r.tag_name === tagName);
              
              if (release) {
                console.log(`Updating existing release: ${tagName}`);
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  body: body,
                });
              } else {
                console.log(`Creating new release: ${tagName}`);
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: tagName,
                  body: body,
                  draft: false,
                  prerelease: false,
                });
              }
            } catch (error) {
              core.setFailed(`Failed to process release: ${error.message}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: release_files/*
